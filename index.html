<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YHEA GAMING | مركز التحميل</title>
  <style>
    body {
      /* ضعي رابط صورة الخلفية هنا */
      background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=2070') no-repeat center center fixed;
      background-size: cover;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      position: relative;
    }

    /* طبقة تعتيم فوق الخلفية لتوضيح المحتوى */
    body::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: -1;
    }

    .box {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 24px;
      width: 360px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .channel-img {
      width: 100%;
      height: 120px;
      background: rgba(255,255,255,0.05) url('https://via.placeholder.com/400x150/1e293b/ffffff?text=YHEA+GAMING') center/cover;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    h2 { margin: 0 0 10px 0; font-size: 22px; color: #00d2ff; }
    p { font-size: 14px; color: #cbd5e1; margin-bottom: 25px; }

    .btn {
      width: 100%;
      padding: 15px;
      margin: 10px 0;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: 0.3s;
      text-decoration: none;
      color: white;
    }

    .sub { background: linear-gradient(45deg, #ff416c, #ff4b2b); }
    .like { background: linear-gradient(45deg, #00d2ff, #3a7bd5); }
    .unlock { background: #334155; }
    .unlock.ready { background: #10b981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }

    .download { 
      background: #facc15; 
      color: #000; 
      margin-top: 20px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

    .hidden { display: none; }
    .footer { margin-top: 25px; font-size: 11px; color: #94a3b8; }
  </style>
</head>
<body>

<div class="box">
  <div class="channel-img"></div>
  <h2>🔒 فك قفل الرابط</h2>
  <p>أكمل المهام لفتح زر التحميل</p>

  <a href="https://www.youtube.com/@YHEAEBARON?sub_confirmation=1" target="_blank" id="subBtn" class="btn sub" onclick="startTimer('sub')">
    <span id="subText">📺 1. اشترك في القناة</span>
  </a>

  <a href="https://www.youtube.com/watch?v=qcs2Rnf6_EA" target="_blank" id="likeBtn" class="btn like" style="display:none;" onclick="startTimer('like')">
    <span id="likeText">👍 2. اعمل لايك للفيديو</span>
  </a>

  <button id="unlockBtn" class="btn unlock" disabled onclick="finalCheck()">
    <span id="unlockText">بانتظار إكمال المهام...</span>
  </button>

  <a id="downloadArea" href="https://sendgb.com/8R1BifDmGlS" class="hidden" target="_blank">
    <button class="btn download">⬇ تحميل البرنامج الآن</button>
  </a>

  <div class="footer">YHEA GAMING © 2026</div>
</div>

<script>
  let subDone = false;
  let likeDone = false;

  function startTimer(type) {
    const btn = type === 'sub' ? document.getElementById('subBtn') : document.getElementById('likeBtn');
    const text = type === 'sub' ? document.getElementById('subText') : document.getElementById('likeText');
    
    // منع الضغط المتكرر وتغيير النص دون إظهار أرقام
    btn.style.pointerEvents = "none";
    text.innerText = "⏳ جاري التحقق من التنفيذ...";

    setTimeout(() => {
      if (type === 'sub') {
        text.innerText = "✅ تم الاشتراك بنجاح";
        btn.style.opacity = "0.6";
        subDone = true;
        document.getElementById('likeBtn').style.display = "flex";
      } else {
        text.innerText = "✅ تم وضع اللايك بنجاح";
        btn.style.opacity = "0.6";
        likeDone = true;
        enableUnlock();
      }
    }, 15000); // الانتظار 15 ثانية
  }

  function enableUnlock() {
    const unlockBtn = document.getElementById('unlockBtn');
    unlockBtn.disabled = false;
    unlockBtn.classList.add('ready');
    document.getElementById('unlockText').innerText = "فتح الرابط الآن";
  }

  function finalCheck() {
    document.getElementById('unlockBtn').style.display = "none";
    document.getElementById('downloadArea').classList.remove('hidden');
  }
</script>

</body>
</html>
